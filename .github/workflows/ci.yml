name: PacGate Verification Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Run Rust unit tests
        run: cargo test --release

      - name: Validate all example rule files
        run: |
          for f in rules/examples/*.yaml; do
            echo "Validating $f..."
            cargo run --release -- validate "$f"
          done

  python-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install "cocotb>=2.0.0" cocotb-tools pytest hypothesis

      - name: Run scoreboard unit tests
        run: |
          source .venv/bin/activate
          python -m pytest verification/test_scoreboard.py -v --junit-xml=scoreboard-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scoreboard-test-results
          path: scoreboard-results.xml

  sim-regress:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build PacGate compiler
        run: cargo build

      - name: Run simulator regression gate
        run: make sim-regress RULES=rules/examples/allow_arp.yaml SIM_REGRESS_COUNT=200

      - name: Upload simulator regression artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-regress-result
          path: sim_regress_result.json

  sim-topology:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build PacGate compiler
        run: cargo build

      - name: Run topology scenario gate
        run: make sim-topology TOPOLOGY_SCENARIO=docs/management/paclab/scenario_v2.example.json

      - name: Upload topology result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-topology-result
          path: topology_result.json

  simulate:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        example: [allow_arp, enterprise, l3l4_firewall, ipv6_firewall, gtp_5g, mpls_network, multicast, vxlan_datacenter, qos_classification, tcp_flags_icmp, arp_security, icmpv6_firewall, qinq_provider, fragment_security, gre_tunnel, conntrack_firewall, mirror_redirect, flow_counters, oam_monitoring, nsh_sfc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install "cocotb>=2.0.0" cocotb-tools pytest hypothesis

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile ${{ matrix.example }} rules
        run: cargo run --release -- compile rules/examples/${{ matrix.example }}.yaml

      - name: Lint generated Verilog
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

      - name: Run simulation (cocotb 2.0 runner)
        run: |
          source .venv/bin/activate
          cd gen/tb && SIM=icarus python run_sim.py

      - name: Run property tests
        continue-on-error: true
        run: |
          source .venv/bin/activate
          python -m pytest gen/tb/test_properties.py -v --junit-xml=property-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.example }}
          path: |
            gen/tb/results.xml
            property-results.xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.example }}
          path: gen/tb/coverage.xml
          if-no-files-found: ignore

      - name: Upload waveforms on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveforms-${{ matrix.example }}
          path: gen/tb/sim_build/*.fst

  simulate-questa:
    if: ${{ vars.ENABLE_QUESTA_CI == 'true' }}
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install "cocotb>=2.0.0" cocotb-tools pytest hypothesis

      - name: Verify Questa tools are present
        run: |
          which vlog
          which vsim

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile enterprise rules
        run: cargo run --release -- compile rules/examples/enterprise.yaml

      - name: Lint generated Verilog with Questa
        run: make lint RULES=rules/examples/enterprise.yaml LINT_SIM=questa

      - name: Run simulation with Questa
        run: |
          source .venv/bin/activate
          cd gen/tb && SIM=questa python run_sim.py

      - name: Upload Questa simulation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-questa
          path: gen/tb/results.xml

  conntrack-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile with --conntrack
        run: cargo run --release -- compile rules/examples/hsm_conntrack.yaml --conntrack

      - name: Lint generated Verilog (conntrack)
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

  multi-flag-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile with --rate-limit --counters --axi
        run: cargo run --release -- compile rules/examples/rate_limited.yaml --rate-limit --counters --axi

      - name: Lint generated Verilog (multi-flag)
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

      - name: Compile port_rewrite with --axi
        run: cargo run --release -- compile rules/examples/port_rewrite.yaml --axi -o gen_port_rw/

      - name: Lint port rewrite Verilog
        run: iverilog -g2012 -o /dev/null gen_port_rw/rtl/*.v rtl/frame_parser.v

  conntrack-simulate:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install "cocotb>=2.0.0" cocotb-tools pytest hypothesis

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile with --conntrack
        run: cargo run --release -- compile rules/examples/hsm_conntrack.yaml --conntrack

      - name: Lint generated Verilog (conntrack)
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

      - name: Run conntrack cocotb simulation (cocotb 2.0 runner)
        run: |
          source .venv/bin/activate
          cd gen/tb && python run_sim.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-conntrack
          path: gen/tb/results.xml

      - name: Upload waveforms on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveforms-conntrack
          path: gen/tb/sim_build/*.fst

  formal-generate:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile GTP rules
        run: cargo run --release -- compile rules/examples/gtp_5g.yaml

      - name: Generate formal assertions
        run: cargo run --release -- formal rules/examples/gtp_5g.yaml

      - name: Verify SVA contains expected assertions
        run: |
          grep -q "parsed_ip_protocol == 8'd17" gen/formal/assertions.sv
          grep -q "cover property" gen/formal/assertions.sv
          echo "SVA assertion checks passed"

      - name: Lint generated formal SVA
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

  rate-limit-simulate:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile with --rate-limit
        run: cargo run --release -- compile rules/examples/rate_limited.yaml --rate-limit

      - name: Simulate with --stateful
        run: cargo run --release -- simulate rules/examples/rate_limited.yaml --packet "ethertype=0x0800,ip_protocol=6,dst_port=80" --stateful --json

  lint-stateful:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile stateful_sequence rules
        run: cargo run --release -- compile rules/examples/stateful_sequence.yaml

      - name: Lint generated Verilog (stateful FSM)
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

      - name: Compile dynamic_firewall with --dynamic
        run: cargo run --release -- compile rules/examples/dynamic_firewall.yaml --dynamic -o gen_dynamic/

      - name: Lint dynamic flow table Verilog
        run: iverilog -g2012 -o /dev/null gen_dynamic/rtl/*.v rtl/*.v

      - name: Lint dynamic_firewall with --dynamic
        run: cargo run --release -- lint rules/examples/dynamic_firewall.yaml --dynamic --json

  opennic-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile with --target opennic
        run: cargo run --release -- compile rules/examples/opennic_l3l4.yaml --target opennic

      - name: Verify runner script generated
        run: |
          test -f gen/tb/run_sim.py && echo "run_sim.py exists"
          grep -q "from cocotb_tools.runner import get_runner" gen/tb/run_sim.py
          echo "Runner script lint passed"

      - name: Lint generated Verilog (OpenNIC)
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v

  corundum-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Build PacGate compiler
        run: cargo build --release

      - name: Compile with --target corundum
        run: cargo run --release -- compile rules/examples/corundum_datacenter.yaml --target corundum

      - name: Lint generated Verilog (Corundum)
        run: iverilog -g2012 -o /dev/null gen/rtl/*.v rtl/*.v
